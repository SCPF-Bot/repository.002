name: Manga To Video

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Manga Download URL (CBZ/Zip)'
        required: true
      ocr_engine:
        type: choice
        description: 'Primary OCR Engine'
        options: [google_vision, manga_ocr, paddle_ocr, comic_text_detector, tesseract]
        default: 'tesseract'
      tts_engine:
        type: choice
        description: 'Primary TTS Engine'
        options: [elevenlabs, fish_speech, xtts_v2, chat_tts, melo_tts, deepgram_aura, edge_tts]
        default: 'edge_tts'

jobs:
  build-and-render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Speeds up subsequent runs by ~3 minutes

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost
          df -h

      - name: Install System Dependencies
        run: |
          chmod +x ./scripts/system_deps.sh
          ./scripts/system_deps.sh

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Manga Pipeline
        env:
          # Mapping GitHub Secrets to Environment Variables for the Python scripts
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          DEEPGRAM_KEY: ${{ secrets.DEEPGRAM_KEY }}
          FISH_KEY: ${{ secrets.FISH_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          # Create a credentials file if the secret exists
          if [ -n "$GOOGLE_APPLICATION_CREDENTIALS_JSON" ]; then
            echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > google_creds.json
            export GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/google_creds.json
          fi

          python scripts/core_pipeline.py \
            --url "${{ github.event.inputs.url }}" \
            --ocr "${{ github.event.inputs.ocr_engine }}" \
            --tts "${{ github.event.inputs.tts_engine }}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          files: output/*.mp4
          tag_name: build-${{ github.run_id }}
          name: "Manga Export - ${{ github.run_number }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
