name: Manga To Video (Mobile Optimized)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Manga Download URL'
        required: true
      ocr_engine:
        type: choice
        description: 'OCR Engine'
        options: [google_vision, manga_ocr, paddle_ocr, tesseract]
        default: 'manga_ocr'
      tts_engine:
        type: choice
        description: 'TTS Engine'
        options: [elevenlabs, edge_tts, xtts_v2, melo_tts]
        default: 'edge_tts'

jobs:
  build-and-render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg tesseract-ocr libtesseract-dev

      - name: Install Base Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install opencv-python pillow natsort aiohttp aiofiles edge-tts pytesseract google-genai 

      - name: JIT Install Engine Dependencies
        run: |
          python scripts/install_engine_deps.py \
            --ocr "${{ github.event.inputs.ocr_engine }}" \
            --tts "${{ github.event.inputs.tts_engine }}"

      - name: Run Manga Pipeline
        id: run_pipeline
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}/scripts
        run: |
          # --- NUKE LOCAL CONFLICTS ---
          find . -name "manga_ocr.py" -delete
          find . -name "manga_ocr" -type d -not -path "*/site-packages/*" -exec rm -rf {} +
          
          mkdir -p output
          python scripts/core_pipeline.py \
            --url "${{ github.event.inputs.url }}" \
            --ocr "${{ github.event.inputs.ocr_engine }}" \
            --tts "${{ github.event.inputs.tts_engine }}" | tee pipeline_log.txt
          
          echo "real_ocr=$(grep 'ACTUAL_OCR=' pipeline_log.txt | cut -d'=' -f2)" >> $GITHUB_OUTPUT
          echo "real_tts=$(grep 'ACTUAL_TTS=' pipeline_log.txt | cut -d'=' -f2)" >> $GITHUB_OUTPUT

      - name: Check Output Existence
        id: check_file
        run: |
          if [ -f "output/final_manga_video.mp4" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: success() && steps.check_file.outputs.exists == 'true'
        with:
          files: output/final_manga_video.mp4
          tag_name: build-${{ github.run_id }}
          name: "Manga Video: ${{ github.run_id }}"
          make_latest: true
