name: Manga To Video

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Manga Download URL'
        required: true
      ocr_engine:
        type: choice
        options: [google_vision, manga_ocr, paddle_ocr, tesseract]
        default: 'tesseract'
      tts_engine:
        type: choice
        options: [elevenlabs, edge_tts, xtts_v2, melo_tts]
        default: 'edge_tts'
      voice_id:
        required: false
        default: 'en-US-AndrewNeural'

jobs:
  build-and-render:
    runs-on: ubuntu-latest
    timeout-minutes: 360 
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: |
            requirements/base.txt
            requirements/ocr_*.txt
            requirements/tts_*.txt

      - name: Install System Dependencies
        run: bash scripts/system_deps.sh

      - name: Install Base Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/base.txt

      - name: JIT Install Engine Dependencies
        run: |
          python scripts/install_engine_deps.py \
            --ocr "${{ github.event.inputs.ocr_engine }}" \
            --tts "${{ github.event.inputs.tts_engine }}"

      - name: Setup Google Credentials
        if: github.event.inputs.ocr_engine == 'google_vision'
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > google_creds.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=${{ github.workspace }}/google_creds.json" >> $GITHUB_ENV

      - name: Run Manga Pipeline
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ github.event.inputs.voice_id }}
          EDGE_TTS_VOICE: ${{ github.event.inputs.voice_id }}
          DEEPGRAM_KEY: ${{ secrets.DEEPGRAM_KEY }}
          FISH_KEY: ${{ secrets.FISH_KEY }}
          PYTHONPATH: ${{ github.workspace }}/scripts
        run: |
          mkdir -p output
          python scripts/core_pipeline.py \
            --url "${{ github.event.inputs.url }}" \
            --ocr "${{ github.event.inputs.ocr_engine }}" \
            --tts "${{ github.event.inputs.tts_engine }}"
          
          echo "Verifying Output Folder Content:"
          ls -lh output/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          files: output/final_manga_video.mp4
          tag_name: build-${{ github.run_id }}
          name: "Manga Video: ${{ github.run_id }}"
          make_latest: true
