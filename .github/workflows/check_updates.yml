name: Check Dependency Updates

on:
  push:
    paths:
      - 'requirements.txt'
  pull_request:
    paths:
      - 'requirements.txt'
  workflow_dispatch:

jobs:
  check-latest-versions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Check Latest Python Package Versions
        run: |
          python -c "
          import urllib.request, json, re
          
          print('\n' + '='*60)
          print('📦 LATEST PIP DEPENDENCIES ON PYPI')
          print('='*60)
          
          with open('requirements.txt', 'r') as f:
              lines = f.readlines()
              
          for line in lines:
              line = line.strip()
              # Ignore empty lines, comments, source tags, and direct git repositories
              if not line or line.startswith('#') or line.startswith('git+') or line.startswith('['):
                  continue
                  
              # Extract package name (stop at ==, >=, -- or spaces)
              match = re.match(r'^([a-zA-Z0-9_\-]+)', line)
              if match:
                  pkg = match.group(1)
                  try:
                      url = f'https://pypi.org/pypi/{pkg}/json'
                      req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                      with urllib.request.urlopen(req) as response:
                          data = json.loads(response.read().decode())
                          latest = data['info']['version']
                          print(f'{pkg.ljust(30)} : Latest available -> {latest}')
                  except Exception as e:
                          print(f'{pkg.ljust(30)} : Could not fetch version')
          print('='*60 + '\n')
          "

      - name: Check Latest System Prerequisites (APT)
        run: |
          echo "============================================================"
          echo "🛠️ LATEST SYSTEM DEPENDENCIES (UBUNTU LATEST REPO)"
          echo "============================================================"
          sudo apt-get update -qq
          
          # Extracted from scripts/system_deps.sh
          PACKAGES="ffmpeg tesseract-ocr libtesseract-dev libgl1 libglib2.0-0 unzip curl espeak-ng libgomp1"
          
          for pkg in $PACKAGES; do
              if apt-cache policy "$pkg" &>/dev/null; then
                  LATEST=$(apt-cache policy "$pkg" | grep Candidate | awk '{print $2}')
                  printf "%-30s : Latest available -> %s\n" "$pkg" "$LATEST"
              else
                  printf "%-30s : Package not found in current repo\n" "$pkg"
              fi
          done
          echo "============================================================"
